
    <nav class="navbar">
        <div class="nav-brand">Website Monitor</div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/logs">Logs</a></li>
            <li><a href="/settings" class="active">Settings</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Configuration</h1>
        
        <form id="settingsForm" class="settings-form">
            <div class="form-section">
                <h3>Target Configuration</h3>
                <div class="form-group">
                    <label for="targetUrl">Target URL</label>
                    <input type="url" id="targetUrl" name="TARGET_URL" required="" placeholder="https://example.com">
                </div>
            </div>

            <div class="form-section">
                <h3>Proxy Configuration</h3>
                <div class="form-group">
                    <label for="proxyList">Proxy List (comma separated)</label>
                    <textarea id="proxyList" name="PROXY_LIST" rows="4" placeholder="http://proxy1:port, http://user:pass@proxy2:port"></textarea>
                    <small>Format: http://ip:port or http://user:pass@ip:port</small>
                </div>
                <button type="button" id="testProxyBtn" class="btn btn-secondary">Test Random Proxy</button>
            </div>

            <div class="form-section">
                <h3>Session Settings</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sessionsPerDay">Sessions Per Day</label>
                        <input type="number" id="sessionsPerDay" name="SESSIONS_PER_DAY" min="1" max="100" value="35">
                    </div>
                    <div class="form-group">
                        <label for="pagesPerSession">Pages Per Session</label>
                        <input type="number" id="pagesPerSession" name="PAGES_PER_SESSION" min="1" max="10" value="4">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="minDuration">Min Session Duration (seconds)</label>
                        <input type="number" id="minDuration" name="MIN_SESSION_DURATION" min="60" value="240">
                    </div>
                    <div class="form-group">
                        <label for="maxDuration">Max Session Duration (seconds)</label>
                        <input type="number" id="maxDuration" name="MAX_SESSION_DURATION" min="60" value="300">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Browser Options</h3>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="headless" name="HEADLESS" checked="">
                        Run in Headless Mode
                    </label>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="userAgentRotation" name="USER_AGENT_ROTATION" checked="">
                        Rotate User Agents
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </div>
        </form>

        <div id="testResult" class="test-result"></div>
    </div>

    <div id="toast" class="toast"></div>
