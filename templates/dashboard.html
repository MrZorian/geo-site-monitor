<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Monitor Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27; 
            color: #f8fafc; 
            min-height: 100vh;
        }
        .navbar { 
            background: #111936; 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        .nav-brand { font-size: 1.5rem; font-weight: bold; color: #6366f1; }
        .nav-links { display: flex; gap: 1rem; list-style: none; }
        .nav-links a { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem;
        }
        .nav-links a:hover, .nav-links a.active { 
            color: #f8fafc; 
            background: rgba(99,102,241,0.2);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem;
        }
        .btn { 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 0.5rem; 
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #6366f1, #8b5cf6); 
            color: white;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1.5rem; 
            margin-bottom: 2rem;
        }
        .stat-card { 
            background: #111936; 
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 1rem; 
            padding: 1.5rem;
            text-align: center;
        }
        .stat-card h3 { 
            color: #94a3b8; 
            font-size: 0.875rem; 
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .stat-value { 
            font-size: 2.5rem; 
            font-weight: bold; 
        }
        .stat-value.blue { color: #6366f1; }
        .stat-value.green { color: #10b981; }
        .stat-value.orange { color: #f59e0b; }
        .stat-value.red { color: #ef4444; }
        .stat-value.purple { color: #8b5cf6; }
        
        .target-card { 
            background: #111936; 
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 1rem; 
            padding: 1.5rem; 
            margin-bottom: 2rem;
        }
        .target-card h3 { color: #94a3b8; margin-bottom: 1rem; }
        .target-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }

            color: #6366f1; 
            padding: 0.5rem 1rem;
