<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Logs | Website Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27; 
            color: #f8fafc; 
            min-height: 100vh;
        }
        .navbar { 
            background: #111936; 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        .nav-brand { font-size: 1.5rem; font-weight: bold; color: #6366f1; }
        .nav-links { display: flex; gap: 1rem; list-style: none; }
        .nav-links a { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem;
        }
        .nav-links a:hover, .nav-links a.active { 
            color: #f8fafc; 
            background: rgba(99,102,241,0.2);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        h1 { margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        
        .filters { 
            display: flex; 
            gap: 1rem; 
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-input {
            background: #111936;
            border: 1px solid rgba(99,102,241,0.2);
            color: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            min-width: 200px;
        }
        .btn { 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 0.5rem; 
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .table-container { 
            background: #111936; 
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 1rem; 
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: rgba(99,102,241,0.1); 
            padding: 1rem; 
            text-align: left;
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
        }
        td { 
            padding: 1rem; 
            border-bottom: 1px solid rgba(99,102,241,0.1);
        }
        tr:hover { background: rgba(99,102,241,0.05); }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge.success { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        
        .stat-box {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }
        .stat-box.pages { background: rgba(99,102,241,0.1); color: #6366f1; }
        .stat-box.ads { background: rgba(245,158,11,0.2); color: #f59e0b; }
        
        .proxy-cell { 
            font-family: monospace; 
            font-size: 0.875rem; 
            color: #94a3b8;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #6366f1;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
        }
        .refresh-btn.spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-chart-line"></i> Website Monitor</div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/logs" class="active">Full Logs</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1><i class="fas fa-history"></i> Session Logs</h1>
        <p class="subtitle">Complete history with pages visited and ads clicked</p>

        <div class="filters">
            <input type="text" class="filter-input" id="searchInput" placeholder="Search...">
            <select class="filter-input" id="statusFilter">
                <option value="">All Status</option>
                <option value="success">Success</option>
                <option value="error">Failed</option>
            </select>
            <button class="btn" onclick="exportLogs()">
                <i class="fas fa-download"></i> Export CSV
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Time</th>
                        <th>Target Website</th>
                        <th>Pages</th>
                        <th>Ads Clicked</th>
                        <th>Duration</th>
                        <th>Proxy</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="logsTable">
                    <tr><td colspan="8" style="text-align: center; padding: 3rem; color: #94a3b8;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadLogs()" id="refreshBtn">
        <i class="fas fa-sync-alt"></i>
    </button>

    <script>
        let allLogs = [];
        
        async function loadLogs() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            try {
                const data = await fetch('/api/logs').then(r => r.json());
                allLogs = data.logs;
                renderLogs(allLogs);
            } catch (e) {
                console.error('Error:', e);
            } finally {
                btn.classList.remove('spinning');
            }
        }
        
        function renderLogs(logs) {
            const tbody = document.getElementById('logsTable');
            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 3rem;">No logs found</td></tr>';
                return;
            }
            
            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>#${log.id}</td>
                    <td>${log.timestamp}</td>
                    <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis;">${log.target_url}</td>
                    <td>
                        <span class="stat-box pages">
                            <i class="fas fa-file"></i> ${log.pages_visited}
                        </span>
                    </td>
                    <td>
                        <span class="stat-box ads">
                            <i class="fas fa-ad"></i> ${log.ads_clicked}
                        </span>
                    </td>
                    <td>${log.session_duration}s</td>
                    <td class="proxy-cell">${log.proxy_used}</td>
                    <td><span class="status-badge ${log.status_color}">${log.status}</span></td>
                </tr>
            `).join('');
        }
        
        function exportLogs() {
            const csv = [
                ['ID', 'Timestamp', 'Target', 'Pages', 'Ads Clicked', 'Duration', 'Proxy', 'Status'],
                ...allLogs.map(l => [l.id, l.timestamp, l.target_url, l.pages_visited, l.ads_clicked, l.session_duration, l.proxy_used, l.status])
            ].map(row => row.join(',')).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `logs-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        // Filters
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allLogs.filter(l => 
                (l.target_url || '').toLowerCase().includes(term) ||
                l.proxy_used.toLowerCase().includes(term)
            );
            renderLogs(filtered);
        });
        
        document.getElementById('statusFilter').addEventListener('change', (e) => {
            const status = e.target.value;
            const filtered = status ? allLogs.filter(l => l.status === status) : allLogs;
            renderLogs(filtered);
        });
        
        loadLogs();
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
