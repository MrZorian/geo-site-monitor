<div class="settings-card">
    <h3><i class="fas fa-globe"></i> Target Websites</h3>
    <div class="form-group">
        <label>Website URLs to Monitor (one per line)</label>
        <textarea name="TARGET_URLS" id="targetUrls" rows="4" 
                  placeholder="https://website1.com&#10;https://website2.com&#10;https://website3.com"></textarea>
        <small style="color: var(--text-secondary);">Enter each URL on a new line</small>
    </div>
    <div id="targetList" style="margin-top: 1rem;">
        <!-- Will show current targets -->
    </div>
</div>
