<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Website Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27; 
            color: #f8fafc; 
            min-height: 100vh;
        }
        .navbar { 
            background: #111936; 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        .nav-brand { font-size: 1.5rem; font-weight: bold; color: #6366f1; }
        .nav-links { display: flex; gap: 1rem; list-style: none; }
        .nav-links a { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem;
        }
        .nav-links a:hover, .nav-links a.active { 
            color: #f8fafc; 
            background: rgba(99,102,241,0.2);
        }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        h1 { margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        
        .card { 
            background: #111936; 
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 1rem; 
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h3 { 
            color: #6366f1; 
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .form-group textarea {
            width: 100%;
            background: #0a0e27;
            border: 1px solid rgba(99,102,241,0.2);
            color: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            min-height: 100px;
            font-family: monospace;
        }
        .form-group input {
            width: 100%;
            background: #0a0e27;
            border: 1px solid rgba(99,102,241,0.2);
            color: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .btn { 
            padding: 0.875rem 2rem; 
            border: none; 
            border-radius: 0.5rem; 
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .checkbox-group input { width: auto; }
        
        .save-notice {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .save-notice.show { transform: translateY(0); opacity: 1; }
        
        .url-list {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .url-badge {
            background: rgba(99,102,241,0.2);
            color: #6366f1;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-chart-line"></i> Website Monitor</div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/logs">Logs</a></li>
            <li><a href="/settings" class="active">Settings</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1><i class="fas fa-cog"></i> Configuration</h1>
        <p class="subtitle">Add your websites to monitor</p>

        <form id="settingsForm">
            <div class="card">
                <h3><i class="fas fa-globe"></i> Your Websites (One per line)</h3>
                <div class="form-group">
                    <label>Target URLs to Visit</label>
                    <textarea name="TARGET_URLS" id="targetUrls" rows="5" 
                        placeholder="https://yourwebsite1.com&#10;https://yourwebsite2.com&#10;https://yourwebsite3.com"></textarea>
                    <small style="color: #94a3b8;">Enter each website URL on a new line. These are the ONLY sites that will be visited.</small>
                </div>
                <div class="url-list" id="urlList"></div>
            </div>

            <div class="card">
                <h3><i class="fas fa-network-wired"></i> Proxy List</h3>
                <div class="form-group">
                    <label>Proxies (comma separated)</label>
                    <textarea name="PROXY_LIST" id="proxyList" rows="3" 
                        placeholder="http://user:pass@proxy1:port, http://user:pass@proxy2:port"></textarea>
                </div>
            </div>

            <div class="card">
                <h3><i class="fas fa-sliders-h"></i> Session Settings</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Sessions Per Day</label>
                        <input type="number" name="SESSIONS_PER_DAY" value="35">
                    </div>
                    <div class="form-group">
                        <label>Pages Per Session</label>
                        <input type="number" name="PAGES_PER_SESSION" value="4">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Min Duration (seconds)</label>
                        <input type="number" name="MIN_SESSION_DURATION" value="240">
                    </div>
                    <div class="form-group">
                        <label>Max Duration (seconds)</label>
                        <input type="number" name="MAX_SESSION_DURATION" value="300">
                    </div>
                </div>
            </div>

            <div class="card">
                <h3><i class="fas fa-desktop"></i> Options</h3>
                <div class="form-group checkbox-group">
                    <input type="checkbox" name="HEADLESS" id="headless" checked>
                    <label for="headless">Run Hidden (Headless)</label>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" name="USER_AGENT_ROTATION" id="userAgentRotation" checked>
                    <label for="userAgentRotation">Rotate User Agents</label>
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-save"></i> Save Settings
            </button>
        </form>
    </div>

    <div class="save-notice" id="saveNotice">
        <i class="fas fa-check-circle"></i> Settings saved!
    </div>

    <script>
        // Load settings
        fetch('/api/settings')
            .then(r => r.json())
            .then(settings => {
                // Populate form
                Object.keys(settings).forEach(key => {
                    const el = document.querySelector(`[name="${key}"]`);
                    if (el) {
                        if (el.type === 'checkbox') {
                            el.checked = settings[key].toLowerCase() === 'true';
                        } else if (key === 'TARGET_URLS' && settings[key]) {
                            el.value = settings[key].split(',').map(u => u.trim()).join('\n');
                            // Show badges
                            const urls = settings[key].split(',').filter(u => u.trim());
                            document.getElementById('urlList').innerHTML = urls.map(u => 
                                `<span class="url-badge">${u.trim()}</span>`
                            ).join('');
                        } else {
                            el.value = settings[key];
                        }
                    }
                });
            });

        // Save settings
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {};
            document.querySelectorAll('input, textarea').forEach(input => {
                if (input.type === 'checkbox') {
                    data[input.name] = input.checked.toString();
                } else if (input.name === 'TARGET_URLS') {
                    // Convert newlines to commas, filter out example.com
                    const urls = input.value.split('\n')
                        .map(u => u.trim())
                        .filter(u => u && !u.includes('example.com'))
                        .join(',');
                    data[input.name] = urls;
                } else {
                    data[input.name] = input.value;
                }
            });

            const response = await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                // Update display
                const urls = data['TARGET_URLS'].split(',').filter(u => u.trim());
                document.getElementById('urlList').innerHTML = urls.map(u => 
                    `<span class="url-badge">${u.trim()}</span>`
                ).join('');
                
                const notice = document.getElementById('saveNotice');
                notice.classList.add('show');
                setTimeout(() => notice.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
